<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>와이텍</title>

<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    color: #222;
  }

  a {
    text-decoration: none;
  }

  .hero {
    position: relative;
    width: 100%;
    height: 82vh;
    max-height: 820px;
    min-height: 620px;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    background-size: 90%;
    background-repeat: no-repeat;
    background-position: right center;
    opacity: 0;
    transition: opacity 1s ease;
    cursor: pointer;
  }

  .slide.active {
    opacity: 1;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      90deg,
      rgba(255,255,255,0.58) 0%,
      rgba(255,255,255,0.22) 42%,
      rgba(255,255,255,0.05) 100%
    );
    z-index: 2;
    pointer-events: none;
  }

  .top-menu {
    position: absolute;
    top: 28px;
    right: 40px;
    z-index: 5;
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
  }

  .top-menu a {
    color: #213D28;
    font-size: 17px;
    font-weight: 700;
  }

  .top-menu a:hover {
    opacity: 0.75;
  }

  .hero-text {
    position: absolute;
    left: 80px;
    bottom: 110px;
    z-index: 5;
    color: #213D28;
    max-width: 560px;
  }

  .hero-logo {
    margin-bottom: 22px;
  }

  .hero-logo img {
    width: 220px;
    max-width: 100%;
    height: auto;
    display: block;
  }

  .hero-title {
    margin: 0 0 12px 0;
    font-size: 42px;
    font-weight: 800;
    color: #213D28;
  }

  .hero-desc {
    margin: 0;
    font-size: 24px;
    line-height: 1.5;
    font-weight: 600;
    color: #213D28;
  }

  .hero-buttons {
    margin-top: 28px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .hero-buttons a {
    display: inline-block;
    padding: 14px 28px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 16px;
    transition: 0.2s ease;
  }

  .hero-buttons a:hover {
    opacity: 0.9;
  }

  .btn-primary {
    background: #213D28;
    color: white;
  }

  .btn-secondary {
    background: white;
    color: #213D28;
    border: 1px solid #213D28;
  }

  .dots {
    position: absolute;
    bottom: 35px;
    left: 80px;
    z-index: 6;
    display: flex;
    gap: 10px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(33,61,40,0.35);
    border: none;
    cursor: pointer;
    padding: 0;
  }

  .dot.active {
    background: #213D28;
  }

  .section {
    padding: 90px 40px;
    text-align: center;
  }

  .section h2 {
    margin: 0 0 12px 0;
    font-size: 48px;
    color: #213D28;
  }

  .section p {
    margin: 0;
    font-size: 20px;
    color: #555;
  }

  .card-container {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 50px;
    flex-wrap: wrap;
  }

  .card {
    background: white;
    padding: 40px 30px;
    width: 300px;
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }

  .card h3 {
    margin-top: 0;
    color: #213D28;
    font-size: 28px;
  }

  .card p {
    font-size: 18px;
    color: #555;
  }

  .card a {
    display: inline-block;
    margin-top: 18px;
    font-size: 17px;
    font-weight: 700;
    color: #213D28;
  }

  footer {
    background: #213D28;
    color: white;
    text-align: center;
    padding: 30px 20px;
    margin-top: 60px;
    font-size: 15px;
  }

  @media (max-width: 1024px) {
    .hero {
      min-height: 600px;
      height: 78vh;
    }

    .slide {
      background-size: 110%;
      background-position: center right;
    }

    .hero-text {
      left: 40px;
      right: 40px;
      bottom: 100px;
      max-width: 500px;
    }

    .top-menu {
      top: 20px;
      right: 24px;
      gap: 18px;
    }
  }

  @media (max-width: 768px) {
    .hero {
      min-height: 560px;
      height: auto;
    }

    .slide {
      background-size: cover;
      background-position: center;
    }

    .top-menu {
      left: 20px;
      right: 20px;
      top: 18px;
      gap: 12px 16px;
      justify-content: flex-end;
    }

    .top-menu a {
      font-size: 15px;
    }

    .hero-text {
      left: 24px;
      right: 24px;
      bottom: 90px;
      max-width: none;
    }

    .hero-logo img {
      width: 170px;
    }

    .hero-title {
      font-size: 30px;
    }

    .hero-desc {
      font-size: 18px;
    }

    .hero-buttons a {
      padding: 12px 20px;
      font-size: 15px;
    }

    .dots {
      left: 24px;
      bottom: 28px;
    }

    .section {
      padding: 70px 20px;
    }

    .section h2 {
      font-size: 36px;
    }

    .section p {
      font-size: 17px;
    }

    .card {
      width: 100%;
      max-width: 360px;
    }
  }
</style>
</head>

<body>

<div class="hero">
  <!-- 지구 이미지 → 회사소개 -->
  <a href="company.html" class="slide active" style="background-image:url('main1.png')"></a>

  <!-- 톱니 이미지 → 비즈니스 -->
  <a href="business.html" class="slide" style="background-image:url('main2.png')"></a>

  <!-- 전구 이미지 → 사업영역 -->
  <a href="company.html#business" class="slide" style="background-image:url('main3.png')"></a>

  <div class="hero-overlay"></div>

  <nav class="top-menu">
    <a href="company.html">회사소개</a>
    <a href="business.html">비즈니스</a>
    <a href="client-partner.html">고객 · 파트너</a>
    <a href="recruit.html">채용</a>
    <a href="location.html">회사위치</a>
  </nav>

  <div class="hero-text">
    <div class="hero-logo">
      <img src="logo.png" alt="와이텍 로고">
    </div>

    <h1 class="hero-title" id="heroTitle">회사소개</h1>
    <p class="hero-desc" id="heroDesc">와이텍 소개 페이지로 이동합니다.</p>

    <div class="hero-buttons">
      <a class="btn-primary" id="heroMainBtn" href="company.html">회사소개</a>
      <a class="btn-secondary" id="heroSubBtn" href="company.html">바로가기</a>
    </div>
  </div>

  <div class="dots">
    <button class="dot active" onclick="goSlide(0)"></button>
    <button class="dot" onclick="goSlide(1)"></button>
    <button class="dot" onclick="goSlide(2)"></button>
  </div>
</div>

<section class="section">
  <h2>Business</h2>
  <p>와이텍의 주요 비즈니스 영역</p>

  <div class="card-container">
    <div class="card">
      <h3>솔루션 구축</h3>
      <p>솔루션 구축 및 최적화</p>
      <a href="business.html">더보기</a>
    </div>

    <div class="card">
      <h3>컨설팅</h3>
      <p>IT 컨설팅 서비스</p>
      <a href="business.html">더보기</a>
    </div>

    <div class="card">
      <h3>인프라 구축</h3>
      <p>서버 · 네트워크 구축</p>
      <a href="business.html">더보기</a>
    </div>
  </div>
</section>

<footer>
  <p>© Y-TECH. All rights reserved.</p>
</footer>

<script>
  const slides = document.querySelectorAll(".slide");
  const dots = document.querySelectorAll(".dot");
  const heroTitle = document.getElementById("heroTitle");
  const heroDesc = document.getElementById("heroDesc");
  const heroMainBtn = document.getElementById("heroMainBtn");
  const heroSubBtn = document.getElementById("heroSubBtn");

  const slideData = [
    {
      title: "회사소개",
      desc: "와이텍 소개 페이지로 이동합니다.",
      mainText: "회사소개",
      mainLink: "company.html",
      subText: "바로가기",
      subLink: "company.html"
    },
    {
      title: "비즈니스",
      desc: "비즈니스 페이지로 이동합니다.",
      mainText: "비즈니스",
      mainLink: "business.html",
      subText: "서비스 보기",
      subLink: "business.html"
    },
    {
      title: "사업영역",
      desc: "회사소개 내 사업영역 섹션으로 이동합니다.",
      mainText: "사업영역",
      mainLink: "company.html#business",
      subText: "바로가기",
      subLink: "company.html#business"
    }
  ];

  let currentIndex = 0;
  let slideTimer;

  function updateHeroText(index) {
    heroTitle.textContent = slideData[index].title;
    heroDesc.textContent = slideData[index].desc;
    heroMainBtn.textContent = slideData[index].mainText;
    heroMainBtn.href = slideData[index].mainLink;
    heroSubBtn.textContent = slideData[index].subText;
    heroSubBtn.href = slideData[index].subLink;
  }

  function showSlide(index) {
    slides.forEach((slide, i) => {
      slide.classList.toggle("active", i === index);
      dots[i].classList.toggle("active", i === index);
    });
    currentIndex = index;
    updateHeroText(index);
  }

  function goSlide(index) {
    showSlide(index);
    resetTimer();
  }

  function nextSlide() {
    let next = currentIndex + 1;
    if (next >= slides.length) {
      next = 0;
    }
    showSlide(next);
  }

  function startTimer() {
    slideTimer = setInterval(nextSlide, 4000);
  }

  function resetTimer() {
    clearInterval(slideTimer);
    startTimer();
  }

  showSlide(0);
  startTimer();
</script>

</body>
</html>
