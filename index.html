<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>와이텍</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#213D28;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-weight:bold;
}

.hero{
height:500px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.hero-text{
position:absolute;
bottom:80px;
left:80px;
color:white;
}

.hero-text h1{
font-size:48px;
margin:0;
}

.hero-text button{
margin-top:20px;
padding:12px 25px;
border:none;
background:white;
color:#213D28;
font-weight:bold;
cursor:pointer;
}

.section{
padding:80px;
text-align:center;
}

.card-container{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
}

.card{
background:white;
padding:40px;
width:260px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card h3{
color:#213D28;
}

.card a{
display:inline-block;
margin-top:15px;
color:#213D28;
font-weight:bold;
}

footer{
background:#222;
color:white;
text-align:center;
padding:30px;
margin-top:80px;
}

</style>
</head>

<body>

<header>

<h2>와이텍</h2>

<nav>
<a href="company.html">회사소개</a>
<a href="business.html">비즈니스</a>
<a href="client-partner.html">고객 · 파트너</a>
<a href="recruit.html">채용</a>
<a href="location.html">회사위치</a>
</nav>

</header>

<div class="hero">

<div class="slide active" style="background-image:url('main1.png')"></div>
<div class="slide" style="background-image:url('main2.png')"></div>
<div class="slide" style="background-image:url('main3.png')"></div>

<div class="hero-text">
<h1>와이텍</h1>
<p>IT 인프라 구축 및 통합 솔루션 전문 기업</p>
<button onclick="location.href='company.html'">회사소개</button>
</div>

</div>

<section class="section">

<h2>Business</h2>
<p>와이텍의 주요 비즈니스 영역</p>

<div class="card-container">

<div class="card">
<h3>솔루션 구축</h3>
<p>솔루션 구축 및 최적화</p>
<a href="business.html">더보기</a>
</div>

<div class="card">
<h3>컨설팅</h3>
<p>IT 컨설팅 서비스</p>
<a href="business.html">더보기</a>
</div>

<div class="card">
<h3>인프라 구축</h3>
<p>서버 · 네트워크 구축</p>
<a href="business.html">더보기</a>
</div>

</div>

</section>

<footer>

<p>© Y-TECH</p>

</footer>

<script>

let slides = document.querySelectorAll(".slide")
let index=0

setInterval(()=>{

slides[index].classList.remove("active")

index++

if(index>=slides.length){
index=0
}

slides[index].classList.add("active")

},4000)

</script>

</body>
</html>
