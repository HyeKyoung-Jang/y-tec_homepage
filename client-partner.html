<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>와이텍 | 고객 · 파트너</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f7f8f7;
      color: #222;
    }

    a {
      text-decoration: none;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      padding: 22px 56px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 70px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(33,61,40,0.08);
    }

    .header-logo img {
      width: 170px;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .top-menu {
      display: flex;
      align-items: center;
      gap: 52px;
      flex-wrap: wrap;
    }

    .top-menu a {
      color: #213D28;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .top-menu a:hover,
    .top-menu a.active {
      color: #213D28;
      font-weight: 700;
    }

    .hero {
      background: linear-gradient(135deg, #edf4ef, #f8faf8);
      padding: 90px 56px 80px;
      border-bottom: 1px solid #e4ebe5;
    }

    .hero-inner {
      max-width: 1320px;
      margin: 0 auto;
    }

    /* 추가된 메인 이미지 스타일 */
    .hero-image {
      width: 100%;
      border-radius: 18px;
      margin-bottom: 40px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.06);
    }

    .hero h1 {
      margin: 0 0 18px;
      font-size: 58px;
      color: #213D28;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      font-size: 22px;
      line-height: 1.65;
      color: #415146;
      font-weight: 500;
    }

    .section {
      padding: 80px 56px 90px;
    }

    .section-inner {
      max-width: 1320px;
      margin: 0 auto;
    }

    .section-head {
      margin-bottom: 34px;
    }

    .section-head h2 {
      margin: 0 0 12px;
      font-size: 42px;
      color: #213D28;
      letter-spacing: -0.02em;
    }

    .section-head p {
      margin: 0;
      font-size: 18px;
      color: #616761;
      line-height: 1.7;
    }

    .info-box {
      background: linear-gradient(135deg, #213D28, #335e42);
      color: white;
      border-radius: 18px;
      padding: 32px 30px;
      margin-bottom: 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .info-box h3 {
      margin: 0 0 10px;
      font-size: 28px;
      color: white;
    }

    .info-box p {
      margin: 0;
      font-size: 17px;
      line-height: 1.8;
      color: rgba(255,255,255,0.9);
    }

    .logo-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 22px;
    }

    .logo-card {
      background: white;
      border: 1px solid #e2e8e3;
      border-radius: 18px;
      min-height: 160px;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
      text-align: center;
    }

    .logo-card img {
      max-width: 150px;
      max-height: 70px;
      object-fit: contain;
      display: block;
    }

    .logo-placeholder {
      width: 100%;
      height: 72px;
      border-radius: 12px;
      border: 1px dashed #bfd0c5;
      background: #f8faf8;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7a867d;
      font-size: 14px;
      font-weight: 600;
    }

    .logo-name {
      font-size: 15px;
      color: #5f655f;
      line-height: 1.5;
    }

    .guide-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      margin-top: 30px;
    }

    .guide-card {
      background: #ffffff;
      border: 1px solid #e2e8e3;
      border-radius: 18px;
      padding: 26px 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    }

    .guide-card h4 {
      margin: 0 0 10px;
      font-size: 22px;
      color: #213D28;
    }

    .guide-card p {
      margin: 0;
      font-size: 15px;
      color: #606661;
      line-height: 1.8;
    }

    .cta-box {
      background: linear-gradient(135deg, #213D28, #335e42);
      color: white;
      border-radius: 20px;
      padding: 38px 34px;
      margin-top: 34px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .cta-box h3 {
      margin: 0 0 8px;
      font-size: 30px;
      color: white;
    }

    .cta-box p {
      margin: 0;
      font-size: 17px;
      color: rgba(255,255,255,0.88);
      line-height: 1.7;
    }

    .cta-box a {
      display: inline-block;
      padding: 14px 26px;
      border-radius: 8px;
      background: white;
      color: #213D28;
      font-weight: 700;
      white-space: nowrap;
    }

    footer {
      background: #213D28;
      color: white;
      text-align: center;
      padding: 30px 20px;
      font-size: 15px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header class="header">
  <a href="index.html" class="header-logo">
    <img src="logo.png" alt="와이텍 로고" />
  </a>

  <nav class="top-menu">
    <a href="company.html">회사소개</a>
    <a href="business.html">비즈니스</a>
    <a href="client-partner.html" class="active">고객 · 파트너</a>
    <a href="recruit.html">채용</a>
    <a href="location.html">회사위치</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-inner">

    <!-- 추가된 메인 이미지 -->
    <img src="client&partner.png" alt="고객 및 파트너" class="hero-image">

    <h1>고객 · 파트너</h1>
    <p>
      와이텍과 함께하는 주요 고객 및 파트너 정보를 확인할 수 있으며,
      향후 로고와 협력 정보를 자유롭게 추가할 수 있습니다.
    </p>

  </div>
</section>
