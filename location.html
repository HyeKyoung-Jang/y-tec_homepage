<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>와이텍 | 회사위치</title>

<link rel="icon" type="image/png" href="./favicon.png">

<style>
*{
box-sizing:border-box;
}

html, body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:#f7f8f7;
color:#222;
}

a{
text-decoration:none;
}

.header{
position:sticky;
top:0;
z-index:100;
width:100%;
padding:22px 56px;
display:flex;
align-items:center;
justify-content:flex-start;
gap:70px;
background:rgba(255,255,255,0.92);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(33,61,40,0.08);
}

.header-logo img{
width:170px;
max-width:100%;
height:auto;
display:block;
}

.top-menu{
display:flex;
align-items:center;
gap:52px;
flex-wrap:wrap;
}

.top-menu a{
color:#213D28;
font-size:18px;
font-weight:500;
letter-spacing:-0.01em;
}

.top-menu a:hover,
.top-menu a.active{
color:#213D28;
font-weight:700;
}

.hero{
position:relative;
width:100%;
min-height:420px;
background:
linear-gradient(90deg, rgba(255,255,255,0.88) 0%, rgba(255,255,255,0.55) 45%, rgba(255,255,255,0.18) 100%),
url('location.png') no-repeat right center / cover;
display:flex;
align-items:center;
}

.hero-inner{
max-width:1320px;
margin:0 auto;
width:100%;
padding:90px 56px;
}

.hero h1{
margin:0 0 18px;
font-size:58px;
color:#213D28;
letter-spacing:-0.03em;
}

.hero p{
margin:0;
max-width:760px;
font-size:22px;
line-height:1.65;
color:#415146;
font-weight:500;
}

.section{
padding:80px 56px 90px;
}

.container{
max-width:1320px;
margin:0 auto;
}

.map-box{
margin-top:40px;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
background:#fff;
}

.info-grid{
margin-top:40px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.card{
background:#ffffff;
border:1px solid #e2e8e3;
border-radius:18px;
padding:30px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.card h3{
margin:0 0 14px;
color:#213D28;
font-size:26px;
letter-spacing:-0.02em;
}

.card p{
margin:0;
font-size:17px;
line-height:1.8;
color:#555;
}

.mail-btn{
display:inline-block;
margin-top:10px;
padding:12px 22px;
background:#213D28;
color:white;
border-radius:6px;
font-weight:600;
}

.route{
line-height:1.8;
font-size:16px;
color:#555;
}

footer{
background:#ffffff;
color:#9aa19c;
text-align:center;
padding:26px 20px;
font-size:13px;
border-top:1px solid #e4e8e5;
}

@media (max-width:1024px){
.header{
padding:22px 28px;
gap:40px;
}

.top-menu{
gap:28px;
}

.hero-inner,
.section{
padding-left:28px;
padding-right:28px;
}
}

@media (max-width:900px){
.info-grid{
grid-template-columns:1fr;
}
}

@media (max-width:768px){
.header{
padding:18px 20px;
align-items:flex-start;
gap:18px;
flex-direction:column;
}

.header-logo img{
width:140px;
}

.top-menu{
gap:12px 18px;
justify-content:flex-start;
}

.top-menu a{
font-size:15px;
}

.hero-inner,
.section{
padding-left:20px;
padding-right:20px;
}

.hero{
min-height:360px;
background-position:center right;
}

.hero h1{
font-size:38px;
}

.hero p{
font-size:18px;
}
}
</style>
</head>

<body>

<header class="header">
<a href="index.html" class="header-logo">
<img src="logo.png" alt="와이텍 로고">
</a>

<nav class="top-menu">
<a href="company.html">회사소개</a>
<a href="business.html">비즈니스</a>
<a href="client-partner.html">고객 · 파트너</a>
<a href="recruit.html">채용</a>
<a href="location.html" class="active">회사위치</a>
</nav>
</header>

<section class="hero">
<div class="hero-inner">
<h1>Contect Us</h1>
<p></p>
</div>
</section>

<section class="section">
<div class="container">

src="https://maps.google.com/maps?q=경기도 과천시 과천대로7길 65&t=&z=16&ie=UTF8&iwloc=&output=embed"
width="100%"
height="450"
style="border:0;"
loading="lazy">
</iframe>
</div>

<div class="info-grid">

<div class="card">
<h3>주소</h3>
<p>
경기도 과천시 과천대로7길 65, 과천상상자이타워 B동 605호
</p>

<p>
<a class="mail-btn" href="mailto:office@y-tec.co.kr">
office@y-tec.co.kr
</a>
</p>
</div>

<div class="card">
<h3>오시는 길</h3>
<div class="route">
<b>대중교통 이용하실 때</b><br>
지하철 : 4호선 정부과천청사역 3번 출구 이용
버스 : 과천지식정보타운 하차 후 도보 400m<br><br>

<b>자차 이용하실 때</b><br>
내비게이션 검색 : 과천상상자이타워 B동
</div>
</div>

</div>

</div>
</section>

<footer>
<p>COPYRIGHT © 2026 Y-TEC ALL RIGHTS RESERVED.</p>
</footer>

</body>
</html>
