<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#f7f8f7;

}

a{
text-decoration:none;
}

.header{
position:sticky;
top:0;
background:white;
padding:22px 56px;
display:flex;
align-items:center;
gap:70px;
border-bottom:1px solid #eee;

}

.header-logo img{

.top-menu{

.top-menu a{
color:#213D28;
font-size:18px;

.top-menu a.active{

.hero{
padding:80px 56px;
background:linear-gradient(135deg,#edf4ef,#f8faf8);

.hero h1{
font-size:52px;
color:#213D28;
margin-bottom:10px;

.hero p{

.section{

}

.container{
max-width:1200px;
margin:auto;
}

.map-box{
margin-top:40px;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.info-grid{
margin-top:40px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.card{
background:white;
border-radius:18px;
padding:30px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.card h3{
margin-top:0;
color:#213D28;
font-size:26px;
}

.card p{
font-size:17px;
line-height:1.7;
color:#555;
}

.mail-btn{
display:inline-block;
margin-top:10px;
padding:12px 22px;
background:#213D28;
color:white;
border-radius:6px;
font-weight:600;
}

.route{
line-height:1.8;
font-size:16px;
}

footer{
background:#213D28;
color:white;
text-align:center;
padding:30px;
margin-top:40px;
}

@media(max-width:900px){

.header{
flex-direction:column;
align-items:flex-start;
gap:20px;
}

.info-grid{
grid-template-columns:1fr;
}

.hero{
padding:60px 30px;
}

.section{
padding:60px 30px;
}

}
